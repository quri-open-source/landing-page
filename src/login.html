<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../src/css/login.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@700&family=Kumbh+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <title>Login</title>
</head>
<body>
<div id="back-button" class="back-button" aria-label="Go back to hub">
  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left">
    <path d="m12 19-7-7 7-7" />
    <path d="M19 12H5" />
  </svg>
</div>

  <div class="login-container">
    <div class="login-box">
      <div class="header">
        <div class="login-title">
          <img src="../public/assets/login-quri-user.png" alt="User Icon" class="icon-user" />
          <h1>Login</h1>
        </div>
        <img src="../public/assets/login-quri-tshirt.png" alt="T-Shirt Icon" class="icon-shirt" />
      </div>

      <form action="#" method="post">
        <label for="email">Username/Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="password">Password:</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" required />
          <img 
            src="../public/assets/login-eye.png" 
            alt="Toggle Visibility" 
            class="toggle-icon" 
            id="togglePassword"
          />
        </div>

        <div class="links">
          <a href="#">Forgot password?</a>
          <a href="#" class="dont-have-accont">Don’t have an account?</a>
        </div>

        <button type="submit" class="login-btn">LOGIN</button>
      </form>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    let isVisible = false;

    togglePassword.addEventListener('click', () => {
      isVisible = !isVisible;
      passwordInput.type = isVisible ? 'text' : 'password';
      togglePassword.src = isVisible 
        ? '../public/assets/login-eye.png' 
        : '../public/assets/login-eye-closed.png';
    });

    const backButton = document.getElementById('back-button');
    backButton.addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
