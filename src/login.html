<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="Access your QURI account and start exploring exclusive custom T-shirt designs. Secure and simple login for creators and fans.">
  <meta name="keywords" content="Quri login, sign in to Quri, Quri account access, t-shirt marketplace login, creator platform login, custom t-shirts platform">
  <meta name="author" content="Quri Team">

  <link rel="stylesheet" href="../src/css/login.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@700&family=Kumbh+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <title>Login</title>
</head>
<body>
  <div
    id="back-button"
    class="back-button"
    role="button"
    tabindex="0"
    aria-label="Go back to hub"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left">
      <path d="m12 19-7-7 7-7" />
      <path d="M19 12H5" />
    </svg>
  </div>

  <div class="login-container">
    <div class="login-box">
      <div class="header">
        <div class="login-title">
          <img
            src="../public/assets/login-quri-user.png"
            alt="User Icon"
            class="icon-user"
            aria-label="User icon"
          />
          <h1>Login</h1>
        </div>
        <img
          src="../public/assets/login-quri-tshirt.png"
          alt="T-Shirt Icon"
          class="icon-shirt"
          aria-label="T-shirt icon"
        />
      </div>

      <form action="#" method="post">
        <label for="email">Username/Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          aria-label="Enter your username or email"
        />

        <label for="password">Password:</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            required
            aria-label="Enter your password"
          />
          <img 
            src="../public/assets/login-eye.png" 
            alt="Toggle password visibility" 
            class="toggle-icon" 
            id="togglePassword"
            aria-label="Toggle password visibility"
          />
        </div>

        <div class="links">
          <a href="#" aria-label="Forgot your password?">Forgot password?</a>
          <a href="#" class="dont-have-accont" aria-label="Create a new QURI account">
            Don’t have an account?
          </a>
        </div>

        <button
          type="submit"
          class="login-btn"
          aria-label="Log in to QURI"
          >
          LOGIN
        </button>
      </form>
    </div>
  </div>

  <script src="./js/carousel.js" defer></script>
  <script src="./js/header.js" defer></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    let isVisible = false;

    togglePassword.addEventListener('click', () => {
      isVisible = !isVisible;
      passwordInput.type = isVisible ? 'text' : 'password';
      togglePassword.src = isVisible 
        ? '../public/assets/login-eye.png' 
        : '../public/assets/login-eye-closed.png';
    });

    const backButton = document.getElementById('back-button');
    backButton.addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
