<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="Join Quri today and start designing, customizing, and selling unique T-shirts. Quick sign-up for artists, creators, and fans of personalized apparel.">
  <meta name="keywords" content="Quri register, sign up Quri, design T-shirts, custom apparel, t-shirt marketplace, personalized fashion, Quri account">
  <meta name="author" content="Quri Team">

  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/register.css" />
  <link
          href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@700&family=Kumbh+Sans:wght@400;500;600;700&display=swap"
          rel="stylesheet"
  />
  <title>Register | Quri</title>
</head>
<body>

<button
        id="back-button"
        class="back-button"
        aria-label="Go back to hub"
        i18n="back-button"
>
  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
       stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
       class="lucide lucide-arrow-left">
    <path d="m12 19-7-7 7-7" />
    <path d="M19 12H5" />
  </svg>
</button>

<div class="register-container">
  <div class="register-box">
    <div class="header">
      <div class="header-container">
      <h1 i18n="register-heading">Register</h1>
        <div class="custom-dropdown" id="language-dropdown">
          <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false" aria-label="Select language" i18n="language-selector">
            🌐 EN
          </button>
          <ul class="dropdown-menu" role="menu">
            <li><button class="dropdown-item lang-btn" data-lang="en" i18n="lang-en">EN</button></li>
            <li><button class="dropdown-item lang-btn" data-lang="es" i18n="lang-es">ES</button></li>
          </ul>
        </div>
      </div>
      <img
              src="../public/assets/login-quri-tshirt.png"
              alt="T-Shirt Icon"
              class="icon-shirt"
              aria-label="T-shirt icon"
              i18n-alt="tshirt-icon"
      />
    </div>

    <form action="#" method="post">
      <label for="firstName" i18n="first-name-label">First Name:</label>
      <input
              type="text"
              id="firstName"
              name="firstName"
              required
              aria-label="Enter your first name"
              i18n-placeholder="first-name-placeholder"
      />

      <label for="secondName" i18n="second-name-label">Second Name:</label>
      <input
              type="text"
              id="secondName"
              name="secondName"
              aria-label="Enter your second name (optional)"
              i18n-placeholder="second-name-placeholder"
      />

      <label for="username" i18n="username-label">Username:</label>
      <input
              type="text"
              id="username"
              name="username"
              required
              aria-label="Choose a username"
              i18n-placeholder="username-placeholder"
      />

      <label for="email" i18n="email-label">Email:</label>
      <input
              type="email"
              id="email"
              name="email"
              required
              aria-label="Enter your email address"
              i18n-placeholder="email-placeholder"
      />

      <label for="phone" i18n="phone-label">Phone Number:</label>
      <input
              type="tel"
              id="phone"
              name="phone"
              required
              aria-label="Enter your phone number"
              i18n-placeholder="phone-placeholder"
      />

      <div class="checkbox-group">
        <label for="terms" >
          <input
                  type="checkbox"
                  required
                  aria-label="Accept Terms and Conditions"
                  id="terms"
          />
          <p i18n="terms-label">
            I accept
          </p>
          <a href="#" aria-label="Read Terms and Conditions" i18n="terms-link">
            Terms and Conditions
          </a>
        </label>
      </div>

      <div class="checkbox-group">
        <label for="offers" >
          <input
                  type="checkbox"
                  aria-label="Opt in to special offers and early access"
                  id="offers"
          />
          <p i18n="offers-label">
            I want to receive special offers, new drops, and early access to exclusive designs.
          </p>
        </label>
      </div>

      <button
              type="submit"
              class="register-btn btn-animated"
              aria-label="Submit registration"
              i18n="register-button"
      >
        Register
      </button>
    </form>
  </div>
</div>

<script>
  const backButton = document.getElementById('back-button');
  backButton.addEventListener('click', () => {
    window.history.back();
  });
</script>
<script src="js/i18n/register/en.js" ></script>
<script src="js/i18n/register/es.js" ></script>
<script src="./js/i18n.js"></script>
</body>
</html>
